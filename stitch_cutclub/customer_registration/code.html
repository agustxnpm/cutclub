<input class="w-full bg-transparent border-none px-0 py-4 text-lg font-headline font-semibold text-on-surface placeholder:text-outline/40 focus:ring-0" placeholder="+1 (555) 000-0000" type="tel"/>

<div class="mt-1">
<input class="w-5 h-5 rounded border-outline-variant/40 bg-surface-container-lowest text-primary-container focus:ring-primary/20 focus:ring-offset-0" id="loyalty" type="checkbox"/>
