<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CutClub - Log New Cut</title>

                    "outline": "#767575",
                    "tertiary-fixed": "#e3dbfd",
                    "error": "#ee7d77",
                    "tertiary-container": "#e3dbfd",

                    "tertiary": "#f1ebff",

                    "error-container": "#7f2927",
                    "surface-dim": "#0e0e0e",

                    "on-secondary": "#1f2023",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-container-lowest font-body text-on-surface min-h-screen flex items-end justify-center relative overflow-hidden">
<!-- Dimmed Background Context (Simulated underlying screen) -->
<div class="absolute inset-0 bg-surface-container-low opacity-40 blur-sm pointer-events-none"></div>
<!-- Action Sheet / Bottom Modal -->
<div class="w-full max-w-2xl bg-surface rounded-t-[2rem] shadow-[0px_-24px_48px_rgba(0,0,0,0.5)] relative z-10 flex flex-col pb-8 pt-4 px-6 md:px-10 max-h-[795px] overflow-y-auto">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant rounded-full mx-auto mb-8"></div>
<!-- Header -->
<header class="flex flex-col mb-8">
<span class="font-label font-medium text-on-surface-variant text-xs uppercase tracking-[0.1em] mb-2">NEW CUT</span>
<div class="flex items-center justify-between">
<h1 class="font-display font-bold text-[2rem] text-on-surface leading-tight tracking-tight">Julian Vargas</h1>
<div class="w-12 h-12 bg-surface-container-highest rounded-full flex items-center justify-center font-display font-bold text-on-surface text-lg shrink-0">
                    JV
                </div>
</div>
</header>
<!-- Loyalty Card -->
<section class="bg-surface-container-high rounded-[1rem] p-6 mb-8 flex flex-col gap-6 relative overflow-hidden">
<!-- Subtle background gradient -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
<div class="flex justify-between items-center z-10">
<span class="font-label font-medium text-on-surface-variant text-xs uppercase tracking-[0.05em]">3 / 4 VISITS TO FREE CUT</span>
</div>
<div class="flex gap-4 justify-between w-full z-10">
<!-- Stamp 1 -->
<div class="flex-1 aspect-square rounded-full bg-primary/20 flex items-center justify-center relative">
<div class="w-3/4 h-3/4 rounded-full border border-primary/40 absolute"></div>
<span class="material-symbols-outlined text-primary text-2xl" data-icon="content_cut">content_cut</span>
</div>
<!-- Stamp 2 -->
<div class="flex-1 aspect-square rounded-full bg-primary/20 flex items-center justify-center relative">
<div class="w-3/4 h-3/4 rounded-full border border-primary/40 absolute"></div>
<span class="material-symbols-outlined text-primary text-2xl" data-icon="content_cut">content_cut</span>
</div>
<!-- Stamp 3 -->
<div class="flex-1 aspect-square rounded-full bg-primary/20 flex items-center justify-center relative">
<div class="w-3/4 h-3/4 rounded-full border border-primary/40 absolute"></div>
<span class="material-symbols-outlined text-primary text-2xl" data-icon="content_cut">content_cut</span>
</div>
<!-- Stamp 4 (Empty) -->
<div class="flex-1 aspect-square rounded-full bg-surface-container-highest border border-dashed border-outline-variant flex items-center justify-center relative">
<span class="material-symbols-outlined text-outline-variant opacity-50" data-icon="local_mall">local_mall</span>
</div>
</div>
</section>
<!-- Form Elements -->
<div class="flex flex-col gap-8 mb-10">
<!-- Service Type -->
<section class="flex flex-col gap-4">
<label class="font-label font-medium text-on-surface-variant text-xs uppercase tracking-[0.05em]">SERVICE TYPE</label>
<div class="flex flex-wrap gap-3">
<button class="bg-primary-container text-on-primary-container px-5 py-2.5 rounded-full font-label font-medium text-sm transition-colors">
                        Skin Fade
                    </button>
<button class="bg-transparent border border-outline-variant/20 text-on-surface px-5 py-2.5 rounded-full font-label font-medium text-sm hover:bg-surface-container-low transition-colors">
                        Classic Cut
                    </button>
<button class="bg-transparent border border-outline-variant/20 text-on-surface px-5 py-2.5 rounded-full font-label font-medium text-sm hover:bg-surface-container-low transition-colors">
                        Beard Trim
                    </button>
<button class="bg-transparent border border-outline-variant/20 text-on-surface px-5 py-2.5 rounded-full font-label font-medium text-sm hover:bg-surface-container-low transition-colors">
                        Hot Towel Shave
                    </button>
<button class="bg-transparent border border-outline-variant/20 text-on-surface px-5 py-2.5 rounded-full font-label font-medium text-sm hover:bg-surface-container-low transition-colors">
                        Shape Up
                    </button>
</div>
</section>
<!-- Total Charged -->
<section class="flex flex-col gap-2 relative p-4 rounded-xl border border-outline-variant/20 bg-surface-container-lowest">
<div class="flex justify-between items-end mb-2">
<label class="font-label font-medium text-on-surface-variant text-xs uppercase tracking-[0.05em]">TOTAL CHARGED</label>
<span class="font-display font-bold text-[2.5rem] text-on-surface leading-none">$85.00</span>
</div>
<p class="font-body text-xs text-inverse-on-surface">Free cuts are automatically applied on the 4th visit.</p>
<!-- Ghost border focus indicator -->
<div class="absolute inset-0 rounded-xl border border-primary opacity-0 transition-opacity focus-within:opacity-50 pointer-events-none"></div>
</section>
</div>
<!-- CTA & Footer -->
<div class="mt-auto relative">
<!-- Signature Halo -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-32 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-primary/8 via-primary/0 to-transparent pointer-events-none"></div>
<button class="w-full bg-primary-container text-on-primary-container font-headline font-bold text-lg py-4 rounded-xl flex items-center justify-center gap-2 relative z-10 transition-transform active:scale-[0.98]">
                LOG CUT
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center justify-center gap-2 mt-4 opacity-80">
<span class="material-symbols-outlined text-inverse-on-surface text-sm" data-icon="lock">lock</span>
<span class="font-label font-medium text-inverse-on-surface text-[10px] uppercase tracking-widest">SECURED · ONE-TAP CONFIRMATION</span>
</div>
</div>
</div>
</body></html>
